<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>cat olive dot net</title>

    <!-- Theme bootstrap: set desired theme before styles resolve -->
    <script>
      (function () {
        var stored;
        try {
          stored = localStorage.getItem('theme');
        } catch (e) {
          stored = null;
        }

        var theme = stored === 'theme-srs' ? 'theme-srs' : 'theme-silly';
        document.documentElement.dataset.theme = theme;
      })();
    </script>

    <!-- Theme stylesheets -->
    <link rel="stylesheet" href="/pub/themes/base.css">
    <link rel="stylesheet" href="/pub/themes/silly.css">
    <link rel="stylesheet" href="/pub/themes/srs.css">

    <!-- Theme apply function, defined in head to avoid first-load flicker -->
    <script>
      (function () {
        function normalize(theme) {
          return theme === 'theme-srs' ? 'theme-srs' : 'theme-silly';
        }

        function apply(theme) {
          var next = normalize(theme);
          document.documentElement.dataset.theme = next;

          try {
            localStorage.setItem('theme', next);
          } catch (e) {
            // Ignore storage errors in restricted contexts.
          }
        }

        apply(document.documentElement.dataset.theme);
        window.__applyTheme = apply;
      })();
    </script>

    <!-- Typefaces -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">

    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet">
  </head>

  <body>
    <main><h1>this is a webbed sited</h1>
<h2>it is by <a href="about">cat</a></h2></main>
    <theme-switcher><button id="theme-toggle" type="button" aria-live="polite">
  Switch theme
</button>

<style>
  #theme-toggle {
    position: fixed;
    inset: auto 1rem 1rem auto;
    padding: .5rem .75rem;
    border-radius: .5rem;
    border: 1px solid currentColor;
    background: transparent;
    cursor: pointer;
  }
</style>

<script>
  (() => {
    const btn = document.getElementById('theme-toggle');

    const getTheme = () =>
      document.documentElement.dataset.theme === 'theme-srs' ? 'theme-srs' : 'theme-silly';

    const label = () =>
      'Theme: ' + (getTheme() === 'theme-srs' ? 'Serious' : 'silly :3');

    function updateLabel() {
      if (btn) btn.textContent = label();
    }

    updateLabel();

    if (btn) {
      btn.addEventListener('click', () => {
        const next = getTheme() === 'theme-silly' ? 'theme-srs' : 'theme-silly';
        if (typeof window.__applyTheme === 'function') {
          window.__applyTheme(next);
        }
        updateLabel();
      });
    }
  })();
</script>
</theme-switcher>
