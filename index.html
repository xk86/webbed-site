
    <meta charset="UTF-8">

    <title></title>

    <!-- Theme bootstrap: set desired theme before styles resolve -->
    <script>
      (function () {
        var stored;
        try {
          stored = localStorage.getItem('theme');
        } catch (e) {
          stored = null;
        }

        var theme = stored === 'theme-srs' ? 'theme-srs' : 'theme-silly';
        document.documentElement.dataset.theme = theme;
      })();
    </script>

    <!-- Theme stylesheets -->
    <link rel="stylesheet" href="/pub/themes/base.css">
    <link rel="stylesheet" href="/pub/themes/silly.css">
    <link rel="stylesheet" href="/pub/themes/srs.css">

    <!-- Theme apply function, defined in head to avoid first-load flicker -->
    <script>
      (function () {
        function normalize(theme) {
          return theme === 'theme-srs' ? 'theme-srs' : 'theme-silly';
        }

        function apply(theme) {
          var next = normalize(theme);
          document.documentElement.dataset.theme = next;

          try {
            localStorage.setItem('theme', next);
          } catch (e) {
            // Ignore storage errors in restricted contexts.
          }
        }

        apply(document.documentElement.dataset.theme);
        window.__applyTheme = apply;
      })();
    </script>

    <theme-switcher><button class="buttonish" id="theme-toggle" type="button" aria-live="polite">
  Switch theme
</button>

<script>
  (() => {
    const btn = document.getElementById('theme-toggle');

    const getTheme = () =>
      document.documentElement.dataset.theme === 'theme-srs' ? 'theme-srs' : 'theme-silly';

    const label = () =>
      'Theme: ' + (getTheme() === 'theme-srs' ? 'Serious' : 'silly :3');

    function updateLabel() {
      if (btn) btn.textContent = label();
    }

    updateLabel();

    if (btn) {
      btn.addEventListener('click', () => {
        const next = getTheme() === 'theme-silly' ? 'theme-srs' : 'theme-silly';
        if (typeof window.__applyTheme === 'function') {
          window.__applyTheme(next);
        }
        updateLabel();
      });
    }
  })();
</script>
</theme-switcher>
